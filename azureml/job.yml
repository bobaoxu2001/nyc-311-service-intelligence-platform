$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
display_name: nyc311-backlog-risk-training
description: Train a backlog-risk classifier using generated NYC 311 KPI outputs.
code: ..
command: >-
  python azureml/train.py
  --input-dir outputs/sample_dashboard_data
  --output-dir ${{outputs.model_outputs}}
environment:
  image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu20.04
  conda_file: azureml/conda.yml
compute: azureml:cpu-cluster
outputs:
  model_outputs:
    type: uri_folder
